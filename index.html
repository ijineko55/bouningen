<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>棒人間をつくれ！</title>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
    .app {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #f7f7f7;
      box-sizing: border-box;
    }

    /* 縦長ステージ */
    #stage {
      position: relative;
      width: min(84vw, 340px);
      aspect-ratio: 9 / 16;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      touch-action: none;
      --partScale: 0.70;
    }

    /* パーツ置き場 */
    #tray {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 140px;
      background: #f2f2f2;
      border-top: 1px dashed #ddd;
      z-index: 1;
    }

    /* 固定フェイス（上に固定・掴めない） */
    #fixedFace {
      position: absolute;
      left: 0; top: 0;
      pointer-events: none;
      user-select: none;
      z-index: 5; /* headより上に表示したいので高め */
    }

    .part {
      position: absolute;
      left: 0; top: 0;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
      cursor: grab;
      z-index: 10;
      transform: scale(var(--partScale));
      transform-origin: top left;
    }
    .part:active { cursor: grabbing; }

    .hud {
      width: min(92vw, 430px);
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
    }
    button { padding: 8px 12px; }
    #msg { margin-left: auto; font-size: 14px; color: #333; }

    /* デバッグ点（緑=ターゲット、赤=アンカー） */
    .dot {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 999px;
      transform: translate(-5px,-5px);
      pointer-events: none;
      display: none;
      z-index: 50;
      background: rgba(0, 200, 0, 0.35);
    }
    .dot.anchor { background: rgba(255, 0, 0, 0.35); }
    .debug .dot { display: block; }

    /* クリア演出 */
    #overlay {
      position: absolute; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      background: transparent;
      text-align: center;
      z-index: 999;
      pointer-events: none;
    }
    #overlay.show { display: flex; }
    .panel { padding: 18px 20px; border: 1px solid #ddd; background: white; border-radius: 12px; pointer-events: auto; }
    #btnOk { margin-top: 10px; padding: 8px 14px; }
    #overlay h1 { margin: 0 0 6px; font-size: 28px; }
    #overlay p  { margin: 0; font-size: 16px; }
    #overlay .panel {
      transform: translateY(80px); /* 数字を増やすほど下に移動 */
    }
  </style>
</head>

<body>
<div class="app">
  <div id="stage">
    <div id="tray"></div>

    <!-- 画面上部に固定表示するフェイス -->
    <img id="fixedFace" src="face.png" alt="face" />

    <div id="overlay">
      <div class="panel">
        <h1 id="clearTitle">できた！！！！</h1>
        <p id="clearDesc">称号：？？？</p>
        <button id="btnOk" type="button">OK</button>
      </div>
    </div>
  </div>

  <div class="hud">
    <button id="btnReset">リセット</button>
    <!-- ガイドボタン  -->
    <!-- <button id="btnDebug">ガイド</button>  -->
    <div id="msg">ドラッグして棒人間を作ろう！</div>
  </div>
</div>

<script>
(() => {
  const stage = document.getElementById('stage');
  const tray  = document.getElementById('tray');
  const faceEl = document.getElementById('fixedFace');

  const overlay = document.getElementById('overlay');
  const clearTitle = document.getElementById('clearTitle');
  const clearDesc  = document.getElementById('clearDesc');
  const msg = document.getElementById('msg');

  const TOLERANCE = 30;     // クリア許容誤差
  const SNAP_RADIUS = 60;   // 吸い付き半径
  const TRAY_H = 140;

  // face.png内で「頭の中心にしたい点」（とりあえず中央）
  // もしズレるならここを微調整してください
  const FACE_CENTER_REL = { x: 0.5, y: 0.5 };

  // 可動パーツ（head.png を追加）
  // headは“中心合わせ”が扱いやすいので anchorRel=0.5,0.5 にしています
  const partsDef = [
    { id: 'head',       src: 'head.png',       anchorRel: {x:0.5,  y:0.5} },
    { id: 'body',       src: 'body.png',       anchorRel: {x:0.5,  y:0.50} },
    { id: 'arm_left',   src: 'arm_left.png',   anchorRel: {x:0.45, y:1.68} },
    { id: 'arm_right',  src: 'arm_right.png',  anchorRel: {x:0.50, y:1.08} },
    { id: 'foot_left',  src: 'foot_left.png',  anchorRel: {x:0.72, y:1.55} },
    { id: 'foot_right', src: 'foot_right.png', anchorRel: {x:0.28, y:1.99} },
  ];

  const parts = new Map();       // id -> {el, x, y, z}
  const targetDots = new Map();  // id -> dotEl（緑）
  const anchorDots = new Map();  // id -> dotEl（赤）
  let targets = {};              // id -> {x,y}
  let zTop = 10;

  function dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    return Math.hypot(dx, dy);
  }

  function applyPos(id) {
    const p = parts.get(id);
    p.el.style.left = p.x + 'px';
    p.el.style.top  = p.y + 'px';
    p.el.style.zIndex = String(p.z);
  }

  function updatePartScale() {
    const r = stage.getBoundingClientRect();
    const playH = r.height - TRAY_H;
    const margin = 20; // 端の余白（好み）

    // まずターゲット（完成形の配置）を仮に作る
    const tmap = computeTargets();

    // 完成形の外接矩形（scale=1 のとき）を計算
    let minL = Infinity, maxR = -Infinity, minT = Infinity, maxB = -Infinity;

    for (const def of partsDef) {
      const el = parts.get(def.id)?.el;
      const w0 = el?.naturalWidth || 0;
      const h0 = el?.naturalHeight || 0;
      if (!w0 || !h0) continue;

      const t = tmap[def.id];

      // scale=1 のときの bbox（左上/右下）
      const left   = t.x - w0 * def.anchorRel.x;
      const right  = t.x + w0 * (1 - def.anchorRel.x);
      const top    = t.y - h0 * def.anchorRel.y;
      const bottom = t.y + h0 * (1 - def.anchorRel.y);

      minL = Math.min(minL, left);
      maxR = Math.max(maxR, right);
      minT = Math.min(minT, top);
      maxB = Math.max(maxB, bottom);
    }

    // 画像がまだ読めてないときの暫定値
    let scale = r.width / 520;

    if (isFinite(minL)) {
      const bboxW = maxR - minL;
      const bboxH = maxB - minT;

      // 横/縦ともに収まるように縮小率を決める
      const fitW = (r.width  - margin * 2) / bboxW;
      const fitH = (playH    - margin * 2) / bboxH;

      scale = Math.min(scale, fitW, fitH);
    }

  // 小さくなりすぎ防止＆最大値
  scale = Math.max(0.35, Math.min(0.75, scale));

  stage.style.setProperty('--partScale', scale.toFixed(3));
}

  function getAnchorWorld(def) {
    const p = parts.get(def.id);
    const w = p.el.getBoundingClientRect().width;
    const h = p.el.getBoundingClientRect().height;
    return {
      x: p.x + w * def.anchorRel.x,
      y: p.y + h * def.anchorRel.y,
    };
  }

  function setAnchorTo(def, tx, ty) {
    const p = parts.get(def.id);
    const w = p.el.getBoundingClientRect().width;
    const h = p.el.getBoundingClientRect().height;
    p.x = tx - w * def.anchorRel.x;
    p.y = ty - h * def.anchorRel.y;
    applyPos(def.id);
  }

  // face.pngを「上部に固定」＋「拡大しない」表示
  function layoutFixedFace() {
    const r = stage.getBoundingClientRect();

    // face の元サイズ
    const naturalW = faceEl.naturalWidth || 0;
    const naturalH = faceEl.naturalHeight || 0;

    // いまのパーツ縮小率（--partScale）
    const scaleStr = getComputedStyle(stage).getPropertyValue('--partScale');
    const partScale = parseFloat(scaleStr) || 1;

    // head.png の “表示サイズ” を基準に face を決める（ここが肝）
    const headEl = parts.get('head')?.el;
    const headBaseW = (headEl && headEl.naturalWidth) ? headEl.naturalWidth * partScale : r.width * 0.55;

    // face の幅 = head幅 × 係数（小さくしたければここを下げる）
    const FACE_TO_HEAD = 0.60; // ← 0.60 〜 0.80 で調整おすすめ
    const targetW = headBaseW * FACE_TO_HEAD;

    // 画面の幅も上限にする（ただし拡大はしない）
    const maxW = Math.min(r.width * 0.80, targetW);
    const displayW = (naturalW > 0) ? Math.min(maxW, naturalW) : maxW;

    faceEl.style.width = Math.round(displayW) + 'px';
    faceEl.style.height = 'auto';

    const displayH = (naturalW > 0 && naturalH > 0)
      ? (displayW * naturalH / naturalW)
      : faceEl.getBoundingClientRect().height;

    // 上部中央に固定
    const x = (r.width - displayW) / 2;
    const y = 12;
    faceEl.style.left = Math.round(x) + 'px';
    faceEl.style.top  = Math.round(y) + 'px';

    // face の中心点（ターゲット計算用）
    return {
      x: x + displayW * FACE_CENTER_REL.x,
      y: y + displayH * FACE_CENTER_REL.y,
      w: displayW,
      h: displayH
    };
  }

  // ターゲット点（正解位置）を計算
  function computeTargets() {
    const r = stage.getBoundingClientRect();
    const playH = r.height - TRAY_H;

    const faceInfo = layoutFixedFace();
    const headCenter = { x: faceInfo.x, y: faceInfo.y };

    // 頭の中心から首までの距離（画面に応じて調整）
    const headToNeck = Math.min(110, playH * 0.22);
    const neck = { x: headCenter.x, y: headCenter.y + headToNeck };

    const armDX = r.width * 0.18;
    const legDX = r.width * 0.12;

    const shoulderY = neck.y + playH * 0.10;
    const legY      = neck.y + playH * 0.55;

    return {
      head:       { x: headCenter.x,      y: headCenter.y },
      body:       { x: neck.x,            y: neck.y },
      arm_left:   { x: neck.x - armDX,    y: shoulderY },
      arm_right:  { x: neck.x + armDX,    y: shoulderY },
      foot_left:  { x: neck.x - legDX,    y: legY },
      foot_right: { x: neck.x + legDX,    y: legY },
    };
  }

  function refreshDots() {
    targets = computeTargets();
    for (const def of partsDef) {
      const t = targets[def.id];

      const td = targetDots.get(def.id);
      if (td) { td.style.left = t.x + 'px'; td.style.top = t.y + 'px'; }

      const ad = anchorDots.get(def.id);
      if (ad) {
        const a = getAnchorWorld(def);
        ad.style.left = a.x + 'px';
        ad.style.top  = a.y + 'px';
      }
    }
  }

  function placePartsInTray() {
    const r = stage.getBoundingClientRect();
    const playH = r.height - TRAY_H;

    const n = partsDef.length;
    for (let i = 0; i < n; i++) {
      const def = partsDef[i];
      const p = parts.get(def.id);
      const el = p.el;

      const w = el.getBoundingClientRect().width;
      const h = el.getBoundingClientRect().height;

      const slotX = (r.width / (n + 1)) * (i + 1);
      p.x = slotX - w / 2;
      p.y = playH + (TRAY_H / 2) - h / 2;

      p.z = ++zTop;
      applyPos(def.id);
    }
  }

  // 評価
  function gradeByOkCount(okCount) {
    const map = {
      1: 'トイレットペーパー級で賞',
      2: 'もやし級で賞',
      3: '未知の生命体で賞',
      4: 'それっぽいで賞',
      5: 'すばらしい芸術で賞',
      6: '棒人間で賞',
    };
    return map[okCount] || '';
  }
  
  function evaluate(showClear = false) {
    let okCount = 0;

    for (const def of partsDef) {
      const a = getAnchorWorld(def);
      const t = targets[def.id];
      if (!t) continue; // 念のため（初期ロード直後の事故防止）
      const d = dist(a, t);
      if (d <= TOLERANCE) okCount++;
    }

    const isClear = okCount === partsDef.length;
    const title = gradeByOkCount(okCount); // ★これが必要

    // 0/6 のときは称号を出さない
    if (title) {
      msg.textContent = `判定OK: ${okCount}/${partsDef.length}　|　${title}`;
    } else {
      msg.textContent = ``;
    }

    if (isClear && showClear) {
      clearTitle.textContent = 'できた！！！！';
      clearDesc.textContent = `称号：${title}`; // 6/6なので必ず入る
      overlay.classList.add('show');
    } else {
      overlay.classList.remove('show');
    }

    refreshDots();
  }

  function attachDrag(def) {
    const p = parts.get(def.id);
    let dragging = false;
    let grab = { dx: 0, dy: 0 };

    p.el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      dragging = true;
      p.el.setPointerCapture(e.pointerId);
      p.z = ++zTop;
      applyPos(def.id);

      const stageRect = stage.getBoundingClientRect();
      const px = e.clientX - stageRect.left;
      const py = e.clientY - stageRect.top;
      grab.dx = px - p.x;
      grab.dy = py - p.y;
    });

    p.el.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const stageRect = stage.getBoundingClientRect();
      const px = e.clientX - stageRect.left;
      const py = e.clientY - stageRect.top;

      p.x = px - grab.dx;
      p.y = py - grab.dy;

      const w = p.el.getBoundingClientRect().width;
      const h = p.el.getBoundingClientRect().height;
      p.x = Math.max(-w * 0.4, Math.min(stageRect.width  - w * 0.6, p.x));
      p.y = Math.max(-h * 0.4, Math.min(stageRect.height - h * 0.6, p.y));

      applyPos(def.id);
      evaluate(false);
    });

    p.el.addEventListener('pointerup', () => {
      if (!dragging) return;
      dragging = false;

      const a = getAnchorWorld(def);
      const t = targets[def.id];
      const d = dist(a, t);

      if (d <= SNAP_RADIUS) {
        setAnchorTo(def, t.x, t.y);
      }

      evaluate(true);
    });
  }

  function createPart(def) {
    const el = new Image();
    el.src = def.src;
    el.className = 'part';
    el.dataset.id = def.id;

    parts.set(def.id, { el, x: 0, y: 0, z: ++zTop });

    const td = document.createElement('div');
    td.className = 'dot';
    stage.appendChild(td);
    targetDots.set(def.id, td);

    const ad = document.createElement('div');
    ad.className = 'dot anchor';
    stage.appendChild(ad);
    anchorDots.set(def.id, ad);

    stage.appendChild(el);
    attachDrag(def);

    el.onload = () => {
      placePartsInTray();
      refreshDots();
      evaluate(false);
    };
  }

  function refreshAll() {
    updatePartScale();
    targets = computeTargets();
    placePartsInTray();
    refreshDots();
    evaluate(false);
  }

  document.getElementById('btnReset').addEventListener('click', () => {
    overlay.classList.remove('show');
    refreshAll();
  });

  const btnOk = document.getElementById('btnOk');
  if (btnOk) {
    btnOk.addEventListener('click', () => {
      overlay.classList.remove('show');
    });
  }

  const btnDebug = document.getElementById('btnDebug');
  if (btnDebug) {
    btnDebug.addEventListener('click', () => {
      document.body.classList.toggle('debug');
      refreshDots();
    });
  }

  window.addEventListener('resize', () => {
    updatePartScale();
  });

  // 起動
  partsDef.forEach(createPart);
  faceEl.onload = () => refreshAll();
})();
</script>
</body>
</html>
